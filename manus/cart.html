<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — Планета Мебели</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/cart.css">
  <style>
    /* Header styles */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(253, 250, 245, 0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      height: 72px;
      display: flex;
      align-items: center;
    }

    .hinner {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 48px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--charcoal);
      text-decoration: none;
    }

    .logo span {
      color: var(--walnut);
      font-style: italic;
    }

    .nav {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav a {
      text-decoration: none;
      color: var(--charcoal);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
      transition: color 0.2s;
    }

    .nav a:hover {
      color: var(--walnut);
    }

    .hactions {
      display: flex;
      align-items: center;
      gap: 20px;
      justify-content: flex-end;
    }

    .cart-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--charcoal);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .cart-btn:hover {
      color: var(--walnut);
    }

    .cart-count {
      background: var(--walnut);
      color: #fff;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
    }

    .profile-link {
      color: var(--charcoal);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .profile-link:hover {
      color: var(--walnut);
    }

    @media (max-width: 1100px) {
      .hinner {
        padding: 0 24px;
      }
    }

    @media (max-width: 768px) {
      .nav {
        display: none;
      }

      .hinner {
        padding: 0 14px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="hinner">
      <a href="index.html" class="logo">Планета <span>Мебели</span></a>
      <ul class="nav">
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="#">Коллекции</a></li>
        <li><a href="#">Дизайнерам</a></li>
        <li><a href="#">О нас</a></li>
      </ul>
      <div class="hactions">
        <a href="profile.html" class="profile-link" id="profileLink">Войти</a>
        <button class="cart-btn" onclick="location.href='cart.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container cart-page">
    <h1 class="cart-title">Корзина <em>товаров</em></h1>

    <!-- Empty cart (hidden by default) -->
    <div id="emptyCart" class="empty-cart" style="display: none;">
      <div class="empty-cart-icon">🛒</div>
      <h2 class="empty-cart-title">Корзина пуста</h2>
      <p class="empty-cart-text">Добавьте товары из каталога, чтобы оформить заказ</p>
      <a href="catalog.html" class="btn btn-primary">Перейти в каталог</a>
    </div>

    <!-- Cart content -->
    <div class="cart-layout">
      <div class="cart-items">
        <table class="cart-table">
          <thead>
            <tr>
              <th>Товар</th>
              <th>Цена</th>
              <th>Количество</th>
              <th>Сумма</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cartTableBody">
            <tr>
              <td colspan="5">
                <div class="spinner"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="cart-summary" id="cartSummary">
        <div class="spinner"></div>
      </div>
    </div>
  </main>

  <script src="js/utils.js" type="module"></script>
  <script src="js/api.js" type="module"></script>
  <script src="js/cart-page.js" type="module"></script>
  <script type="module">
    import { initCartPage } from './js/cart-page.js';

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('pm_cart') || '[]');
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      const cartCount = document.getElementById('cartCount');
      if (cartCount) cartCount.textContent = count;
    }

    function updateProfileLink() {
      const user = JSON.parse(localStorage.getItem('pm_user') || 'null');
      const profileLink = document.getElementById('profileLink');
      if (profileLink && user) {
        profileLink.textContent = user.name.split(' ')[0];
      }
    }

    updateCartCount();
    updateProfileLink();

    window.addEventListener('storage', (e) => {
      if (e.key === 'pm_cart') updateCartCount();
    });

    initCartPage();
  </script>

</body>

</html>
