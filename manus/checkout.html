<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — Планета Мебели</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/checkout.css">
  <style>
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(253, 250, 245, 0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      height: 72px;
      display: flex;
      align-items: center;
    }

    .hinner {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 48px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--charcoal);
      text-decoration: none;
    }

    .logo span {
      color: var(--walnut);
      font-style: italic;
    }

    .nav {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav a {
      text-decoration: none;
      color: var(--charcoal);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
      transition: color 0.2s;
    }

    .nav a:hover {
      color: var(--walnut);
    }

    .hactions {
      display: flex;
      align-items: center;
      gap: 20px;
      justify-content: flex-end;
    }

    .cart-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--charcoal);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .cart-count {
      background: var(--walnut);
      color: #fff;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
    }

    .profile-link {
      color: var(--charcoal);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    @media (max-width: 1100px) {
      .hinner {
        padding: 0 24px;
      }
    }

    @media (max-width: 768px) {
      .nav {
        display: none;
      }

      .hinner {
        padding: 0 14px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="hinner">
      <a href="index.html" class="logo">Планета <span>Мебели</span></a>
      <ul class="nav">
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="#">Коллекции</a></li>
        <li><a href="#">Дизайнерам</a></li>
        <li><a href="#">О нас</a></li>
      </ul>
      <div class="hactions">
        <a href="profile.html" class="profile-link" id="profileLink">Войти</a>
        <button class="cart-btn" onclick="location.href='cart.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container checkout-page">
    <h1 class="checkout-title">Оформление <em>заказа</em></h1>

    <div class="checkout-layout">
      <!-- Form -->
      <div class="checkout-form">
        <div class="form-section">
          <h2 class="section-title">Контактные данные</h2>
          <div class="fg">
            <label>ФИО *</label>
            <input type="text" id="fullname" placeholder="Иванов Иван Иванович">
            <span class="error-message" id="fullnameError"></span>
          </div>
          <div class="form-row">
            <div class="fg">
              <label>Телефон *</label>
              <input type="tel" id="phone" placeholder="+7 (900) 123-45-67">
              <span class="error-message" id="phoneError"></span>
            </div>
            <div class="fg">
              <label>Email *</label>
              <input type="email" id="email" placeholder="ivan@example.com">
              <span class="error-message" id="emailError"></span>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2 class="section-title">Способ доставки</h2>
          <div class="delivery-options">
            <label class="delivery-option selected">
              <input type="radio" name="delivery" value="pickup" checked>
              <span>Самовывоз</span>
              <span class="delivery-price">Бесплатно</span>
            </label>
            <label class="delivery-option">
              <input type="radio" name="delivery" value="courier">
              <span>Доставка курьером</span>
              <span class="delivery-price">500 ₽ (бесплатно от 10 000 ₽)</span>
            </label>
          </div>
          <div class="address-field" id="addressField">
            <div class="fg">
              <label>Адрес доставки *</label>
              <textarea id="address" rows="2" placeholder="Город, улица, дом, квартира"></textarea>
            </div>
            <div class="fg">
              <label>Дата доставки</label>
              <input type="date" id="deliveryDate">
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2 class="section-title">Способ оплаты</h2>
          <div class="payment-options">
            <label class="payment-option selected">
              <input type="radio" name="payment" value="card" checked>
              <span>Карта онлайн</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="cash">
              <span>Наличные курьеру</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="bank_transfer">
              <span>Безналичный счёт для юрлиц</span>
            </label>
          </div>
        </div>

        <div class="form-section">
          <h2 class="section-title">Комментарий</h2>
          <div class="fg">
            <textarea id="comment" rows="3" placeholder="Пожелания к заказу..."></textarea>
          </div>
          <label class="register-checkbox">
            <input type="checkbox" id="register">
            <span>Зарегистрироваться (пароль будет отправлен на email)</span>
          </label>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <h3 class="summary-title">Ваш заказ</h3>
        <div class="order-items-list" id="orderItemsList">
          <div class="spinner"></div>
        </div>
        <div class="summary-row">
          <span>Товары</span>
          <span id="summarySubtotal">0 ₽</span>
        </div>
        <div class="summary-row">
          <span>Скидка</span>
          <span id="summaryDiscount">0 ₽</span>
        </div>
        <div class="summary-row">
          <span>Доставка</span>
          <span id="summaryDelivery">Бесплатно</span>
        </div>
        <div class="summary-row total">
          <span>Итого</span>
          <span id="summaryTotal">0 ₽</span>
        </div>
        <button class="submit-order" id="submitOrder">Оформить заказ</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/api.js" type="module"></script>
  <script src="js/checkout.js" type="module"></script>
  <script type="module">
    import { initCheckout } from './js/checkout.js';

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('pm_cart') || '[]');
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      const cartCount = document.getElementById('cartCount');
      if (cartCount) cartCount.textContent = count;
    }

    function updateProfileLink() {
      const user = JSON.parse(localStorage.getItem('pm_user') || 'null');
      const profileLink = document.getElementById('profileLink');
      if (profileLink && user) {
        profileLink.textContent = user.name.split(' ')[0];
      }
    }

    updateCartCount();
    updateProfileLink();

    initCheckout();
  </script>

</body>

</html>
