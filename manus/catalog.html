<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Планета Мебели</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/catalog.css">
  <style>
    /* Header styles */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(253, 250, 245, 0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      height: 72px;
      display: flex;
      align-items: center;
    }

    .hinner {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 48px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--charcoal);
      text-decoration: none;
    }

    .logo span {
      color: var(--walnut);
      font-style: italic;
    }

    .nav {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav a {
      text-decoration: none;
      color: var(--charcoal);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
      transition: color 0.2s;
    }

    .nav a:hover,
    .nav a.active {
      color: var(--walnut);
    }

    .hactions {
      display: flex;
      align-items: center;
      gap: 20px;
      justify-content: flex-end;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 6px 28px 6px 0;
      width: 180px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--charcoal);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--walnut);
    }

    .search-icon {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mid);
      font-size: 17px;
      cursor: pointer;
    }

    .cart-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--charcoal);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .cart-btn:hover {
      color: var(--walnut);
    }

    .cart-count {
      background: var(--walnut);
      color: #fff;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
    }

    .profile-link {
      color: var(--charcoal);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .profile-link:hover {
      color: var(--walnut);
    }

    @media (max-width: 1100px) {
      .hinner {
        padding: 0 24px;
      }
    }

    @media (max-width: 768px) {
      .nav {
        display: none;
      }

      .search-wrap {
        display: none;
      }

      .hinner {
        padding: 0 14px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="hinner">
      <a href="../mak/index.html" class="logo">Планета <span>Мебели</span></a>
      <ul class="nav">
        <li><a href="catalog.html" class="active">Каталог</a></li>
        <li><a href="#">Коллекции</a></li>
        <li><a href="#">Дизайнерам</a></li>
        <li><a href="#">О нас</a></li>
      </ul>
      <div class="hactions">
        <div class="search-wrap">
          <input type="text" placeholder="Поиск мебели...">
          <span class="search-icon">⌕</span>
        </div>
        <a href="../mak/profile.html" class="profile-link" id="profileLink">Войти</a>
        <button class="cart-btn" onclick="location.href='cart.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="catalog-layout">
      <!-- Filters Sidebar -->
      <aside class="filters-sidebar" id="filtersSidebar">
        <div class="filter-group">
          <div class="filter-title" onclick="toggleFilter(this)">
            Категория
            <span class="toggle-icon">▼</span>
          </div>
          <div class="filter-content">
            <div class="category-list" id="categoryList">
              <label class="category-item">
                <input type="radio" name="category" value="1"> Диваны
                <span class="category-count">12</span>
              </label>
              <label class="category-item">
                <input type="radio" name="category" value="2"> Кресла
                <span class="category-count">8</span>
              </label>
              <label class="category-item">
                <input type="radio" name="category" value="3"> Кровати
                <span class="category-count">6</span>
              </label>
              <label class="category-item">
                <input type="radio" name="category" value="4"> Шкафы
                <span class="category-count">5</span>
              </label>
              <label class="category-item">
                <input type="radio" name="category" value="5"> Столы
                <span class="category-count">7</span>
              </label>
              <label class="category-item">
                <input type="radio" name="category" value="6"> Стулья
                <span class="category-count">10</span>
              </label>
            </div>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-title" onclick="toggleFilter(this)">
            Цена
            <span class="toggle-icon">▼</span>
          </div>
          <div class="filter-content">
            <div class="price-range">
              <div class="price-inputs">
                <div class="price-input">
                  <label>от</label>
                  <input type="number" id="priceMin" placeholder="от 5 000 ₽">
                </div>
                <div class="price-input">
                  <label>до</label>
                  <input type="number" id="priceMax" placeholder="до 250 000 ₽">
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-title" onclick="toggleFilter(this)">
            Материал
            <span class="toggle-icon">▼</span>
          </div>
          <div class="filter-content">
            <div class="checkbox-group">
              <label class="checkbox-item">
                <input type="checkbox" name="material" value="wood"> Дерево
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="material" value="metal"> Металл
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="material" value="fabric"> Ткань
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="material" value="combined"> Комбинированный
              </label>
            </div>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-title" onclick="toggleFilter(this)">
            Размеры
            <span class="toggle-icon">▼</span>
          </div>
          <div class="filter-content">
            <div class="checkbox-group">
              <label class="checkbox-item">
                <input type="radio" name="size" value="small"> до 150 см
              </label>
              <label class="checkbox-item">
                <input type="radio" name="size" value="medium"> 150–200 см
              </label>
              <label class="checkbox-item">
                <input type="radio" name="size" value="large"> >200 см
              </label>
            </div>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-title" onclick="toggleFilter(this)">
            Бренд
            <span class="toggle-icon">▼</span>
          </div>
          <div class="filter-content">
            <select class="filter-select" id="brandSelect">
              <option value="">Все бренды</option>
            </select>
          </div>
        </div>

        <button class="btn btn-outline" id="resetFilters" style="width:100%;margin-top:16px">Сбросить все
          фильтры</button>
      </aside>

      <!-- Products Area -->
      <div class="products-area">
        <div class="sort-bar">
          <div class="products-count" id="productsCount">Найдено 48 товаров</div>
          <select class="sort-select" id="sortSelect">
            <option value="new">Сначала новинки</option>
            <option value="price_asc">По возрастанию цены</option>
            <option value="price_desc">По убыванию цены</option>
            <option value="popular">По популярности</option>
          </select>
        </div>

        <div class="products-grid" id="productsGrid">
          <div class="spinner"></div>
        </div>

        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </main>

  <!-- Mobile Filter -->
  <button class="mobile-filter-btn" id="mobileFilterBtn">
    🔍 Фильтры
  </button>
  <div class="mobile-filter-overlay" id="mobileFilterOverlay"></div>

  <script>
    // Toggle filter group
    window.toggleFilter = function (element) {
      const group = element.closest('.filter-group');
      group.classList.toggle('collapsed');
    };
  </script>

  <script type="module">
    import { initCatalog } from './js/catalog.js';

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('pm_cart') || '[]');
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      const cartCount = document.getElementById('cartCount');
      if (cartCount) cartCount.textContent = count;
    }

    function updateProfileLink() {
      const user = JSON.parse(localStorage.getItem('pm_user') || 'null');
      const profileLink = document.getElementById('profileLink');
      if (profileLink && user) {
        profileLink.textContent = user.name.split(' ')[0];
      }
    }

    updateCartCount();
    updateProfileLink();

    window.addEventListener('storage', (e) => {
      if (e.key === 'pm_cart') updateCartCount();
    });

    // Initialize catalog
    initCatalog();
  </script>

</body>

</html>
